name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - .gitattributes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: payload-extract-windows-x86_64
          - target: aarch64-pc-windows-msvc
            name: payload-extract-windows-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/payload-extract.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: payload-extract-macos-aarch64
          path: target/aarch64-apple-darwin/release/payload-extract

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: payload-extract-macos-x86_64
          path: target/x86_64-apple-darwin/release/payload-extract

  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: payload-extract-linux-x86_64
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            name: payload-extract-linux-aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/payload-extract

  build-android:
    runs-on: ubuntu-latest
    env:
      ONDK_VERSION: r30.0
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            name: payload-extract-android-aarch64
          - target: x86_64-linux-android
            name: payload-extract-android-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache ONDK
        id: ondk-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ondk
          key: ondk-${{ env.ONDK_VERSION }}-linux

      - name: Download ONDK
        if: steps.ondk-cache.outputs.cache-hit != 'true'
        run: |
          url="https://github.com/topjohnwu/ondk/releases/download/${ONDK_VERSION}/ondk-${ONDK_VERSION}-linux.tar.xz"
          mkdir -p "${{ runner.temp }}/ondk"
          curl -fL "$url" -o "${{ runner.temp }}/ondk.tar.xz"
          tar -C "${{ runner.temp }}/ondk" --strip-components=1 -xf "${{ runner.temp }}/ondk.tar.xz"

      - name: Link ONDK Rust toolchain
        run: rustup toolchain link ondk "${{ runner.temp }}/ondk/toolchains/rust"

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-ondk-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-ondk-cargo-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ runner.temp }}/ondk
          ANDROID_NDK_ROOT: ${{ runner.temp }}/ondk
          RUSTC_BOOTSTRAP: "1"
          RUSTFLAGS: "-Clinker-plugin-lto"
          CFLAGS_aarch64-linux-android: "-flto"
          CXXFLAGS_aarch64-linux-android: "-flto"
          CFLAGS_x86_64-linux-android: "-flto"
          CXXFLAGS_x86_64-linux-android: "-flto"
        run: |
          cargo +ondk ndk -t ${{ matrix.target }} --platform 23 build --release \
            -Z build-std=std,panic_abort \
            -Z build-std-features=optimize_for_size \
            --no-default-features --features http-rustls

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/payload-extract

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
